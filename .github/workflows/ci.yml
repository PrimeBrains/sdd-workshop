name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: moira-backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: moira/backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22' # dependency-cruiser 17.4.3 needs ^20.12 || ^22 || >=24
          cache: npm
          cache-dependency-path: moira/backend/package-lock.json
      - run: npm ci
      - run: npm run build # tsc — type-checks all of src, incl. *.test-d.ts samples
      - run: npm run test:types # vitest --typecheck.only — runs the D-2/D-3 type samples
      - run: npm run test:cov # vitest run + coverage; incl. PBT + done-lock it.fails (GREEN)
      - run: npm run depcruise # 計器① fitness: no-circular + fold-no-downstream

  cli:
    name: moira-cli
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            moira/backend/package-lock.json
            moira/cli/package-lock.json
      - run: npm ci && npm run build # engine first — cli depends on file:../backend dist
        working-directory: moira/backend
      - run: npm ci
        working-directory: moira/cli
      - run: npm run build # tsc strict + exactOptionalPropertyTypes
        working-directory: moira/cli
      - run: npm test # vitest: emit/store/golden + adapter (provider/drift/settings-merge/install/hooks)
        working-directory: moira/cli

  frontend:
    name: moira-frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: moira/frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: moira/frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck # tsc --noEmit
      - run: npm run lint # eslint .
      - run: npm run depcruise # 第4器 fitness: no-circular + single-backend-bridge + single-seam surfaces
      - run: npm run test:cov # vitest: src tests + 計器③ coverage gate + scenario fixture derive-goldens
      - run: npx playwright install --with-deps chromium # 計器③ browser (pinned to @playwright/test)
      - run: npm run test:e2e # 計器③ E2E scenario regression (green locks + test.fail tripwires)
